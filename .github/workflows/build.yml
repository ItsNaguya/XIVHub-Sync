name: Build and Release Plugin

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download Dalamud
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile latest.zip
          Expand-Archive -Force latest.zip "$env:AppData\XIVLauncher\addon\Hooks\dev\"

      - name: Build
        run: dotnet build -c Release

      - name: Generate pluginmaster
        run: |
          $json = Get-Content "XIVHubCompanion.json" | ConvertFrom-Json
          $manifest = @{
              Author = $json.Author
              Name = $json.Name
              Punchline = $json.Punchline
              Description = $json.Description
              InternalName = $json.InternalName
              AssemblyVersion = $json.AssemblyVersion
              RepoUrl = "https://github.com/${{ github.repository }}"
              ApplicableVersion = "any"
              DalamudApiLevel = $json.DalamudApiLevel
              DownloadCount = 0
              LastUpdate = [DateTimeOffset]::UtcNow.ToUnixTimeSeconds()
              DownloadLinkInstall = "https://raw.githubusercontent.com/${{ github.repository }}/repo/latest.zip"
              DownloadLinkUpdate = "https://raw.githubusercontent.com/${{ github.repository }}/repo/latest.zip"
              DownloadLinkTesting = "https://raw.githubusercontent.com/${{ github.repository }}/repo/latest.zip"
              LoadRequiredState = 0
              LoadSync = $false
              LoadPriority = 0
          }
          @($manifest) | ConvertTo-Json -Depth 10 | Out-File "pluginmaster.json"

      - name: Publish to repo branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan repo
          git rm -rf .
          Copy-Item bin/Release/XIVHubCompanion/latest.zip .
          git add latest.zip pluginmaster.json
          git commit -m "Update pluginmaster and zip for release"
          git push -f origin repo
